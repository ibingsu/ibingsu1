<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button id="btn">버튼</button>
</body>
<script>
    const firstClick = function () {
        alert("first");
    }
    const secondClick = function () {
        alert("second");
    };

    // onclick은 click 이벤트가 발생할 때 기본으로 실행되는 이벤트 리스너
    // 이벤트 리스너 = 콜백 함수의 일종
    // document.getElementById("btn").onclick = secondClick;

    // firstClick과 secondClick은
    // click 이벤트 발생 시 호출되는 콜백함수 이다
    document.getElementById("btn").addEventListener("click", firstClick)
    document.getElementById("btn").addEventListener("click", secondClick)
</script>
<!-- 이벤트: 클릭/키보드 등 행동 시 발생하는 이벤트-->
<!-- 이벤트 리스너: 이벤트가 발생할 때 실행할 함수-->
<!-- 함수 표현식 익명 함수를 변수에 대입 -->
</html>
