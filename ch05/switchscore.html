<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>문자열 Switch</title>
</head>
<body>
    <input id="input" type="number" />
    <button id="btn" type="button">확인</button>
    <div id="print"></div>
</body>
</html>
<script>
    // 입력받은 문자가 "y" or "n"인 경우 작업 수행 / 작업수행 x
    // "y" or "n"이 아닌 경우 "유효하지 않은 문자입니다."

    // 1. 버튼 클릭 이벤트 등록
    document.getElementById("btn").onclick = function () {
        // 2. input 내 value 조회
        let score = parseInt(document.getElementById("input").value);
        let result = null;

        if (score < 0 || score > 100) {
            result = "올바른 점수를 입력하세요.";
        } else {
            switch (Math.floor(score/10)) {
                case 9:
                    result = "A";
                    break;
                case 8:
                    result = "B";
                    break;
                case 7:
                    result = "C";
                    break;
                case 6:
                    result = "D";
                    break;
                default:
                    result = "F";
                    break;
            }
        }

        // 4. div#print에 결과값 반영
        document.getElementById("print").textContent = result;
    };
</script>
