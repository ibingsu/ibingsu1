<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: rgb(245, 245, 245);
            font-family: "Noto Sans KR", sans-serif;
        }
        h1 {
            color: rgb(50, 80, 160);
        }

        /* 클래스를 선택하려면 클래스 앞에 '.' */
        /* 아이디를 선택하려면 아이디명 앞에 '#' */

        .wrap {
            width: 600px;
            margin: 30px auto;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
        }

        img {
            width: 100%;
            border-radius: 10px;
        }

        .menu_box {
            margin-top: 20px;
            padding: 15px;
            background-color: rgb(232, 245, 255);
            border-radius: 10px;
        }

        .menu_box li {
            margin-bottom: 8px;
        }


        .event_box {
            margin-top: 20px;
            padding: 15px;
            background-color: rgb(255, 241, 219);
            border-radius: 10px;
        }

        input {
            width: 400px;
            height: 34px;
        }

        button {
            height: 38px;
            background-color: rgb(50, 80, 160);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background-color: rgb(255, 120, 120);
        }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>우리 반 간식 소개 & 추첨</h1>
        <p>친구들과 먹고 싶은 간식을 소개하고 추첨하는 웹 페이지입니다.</p>
        <!-- 절대경로 "/"", 프로젝트 최상위 경로, 혹은 웹서버나 도메인의 최상위 경로 -->
        <!-- "./", 현재 파일이 있는 폴더  -->
        <!-- "../", 현재 파일이 있는 폴더의 상위 폴더 -->
        <img src="./snack.jpg" alt="간식 사진"/>
        <div class="menu_box">
            <h2>인기간식</h2>
            <ul id="menu_list">
            </ul>
        </div>
        <div class="menu_box">
            <h2>간식 추가하기</h2>
            <input id="input_snack" type="text" placeholder="추가할 간식 이름"/>
            <button id="btn_add">추가</button>
        </div>
        <div class="event_box">
            <h2>오늘의 간식</h2>
            <p id ="event_result">버튼을 누르면 간식이 추첨됩니다.</p>
            <button id="btn_event">간식 추첨</button>
        </div>
    </div>
    <script>
        const snacks = ["치즈 토스트", "딸기 에이드", "초코 쿠키"];
        
        function renderSnack(snack) {
            const li = document.createElement("li");
            li.textContent = snack;
            document.getElementById("menu_list").appendChild(li);
        }

        for (i = 0; i < snacks.length; i++) {
            renderSnack(snacks[i]);
        }

        const addSnack = function(snack) {
            if (snack.length > 0) {
                snacks.push(snack);
                return true;
            } else {
                return false;
            }
        };

        document.getElementById('btn_add').onclick = function () {
            const snack = document.getElementById("input_snack").value;

            if (addSnack(snack)) {
                renderSnack(snack)
            } else {
                alert("간식 이름을 입력하세요.");
            }
        };

        const getRandomNumber = function (n = 0) {
            return Math.floor(Math.random() * n);
        };

        document.getElementById("btn_event").onclick = function () {
            const n = getRandomNumber(snacks.length);
            
            document.getElementById("event_result").textContent = `오늘의 간식은 ${snacks[n]}입니다!`;
        };
    </script>
</body>
</html>
