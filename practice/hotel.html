<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>호텔 체크인 관리</title>
    <style>
        @font-face {
            font-family: 'ElegantSerif';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2604-1@1.0/GraceSerif-Regular.woff2') format('woff2');
            font-weight: 500;
            font-display: swap;
        }

        @font-face {
            font-family: 'ElegantSerif';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2604-1@1.0/GraceSerif-Bold.woff2') format('woff2');
            font-weight: 700;
            font-display: swap;
        }

        body {
            font-family: 'ElegantSerif';
            background-color: black;
        }

        h1 {
            color: burlywood;
        }

        h2 {
            color: white;
        }

        p {
            font-size: 18px;
            color: white;
        }

        .wrap {
            margin-top: 20px;
            border-radius: 10px;
            background-color: rgba(255, 255, 255, 0.5);
            padding: 20px;
            margin: 20px auto 0;
            width: 50%;
        }

        img {
            width: 100%;
            border-radius: 10px;
        }

        .checkin_wrap {
            background-color: #4d4b88;
            padding: 15px;
            margin: 15px 0;
            border-radius: 10px;
        }

        .checkin_wrap h2,
        .room_wrap h2 {
            margin-top: 5px;
        }

        .room_wrap {
            background-color: #684b4d;
            padding: 15px;
            margin: 15px 0;
            border-radius: 10px;
        }

        input {
            width: 70%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
        }

        button {
            padding: 12px 10px;
            border: none;
            border-radius: 10px;
            background-color: burlywood;
            color: black;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: rgb(255, 214, 160);
        }

        ul {
            padding-left: 20px;
        }

        li {
            margin: 10px 0;
            padding: 10px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
        }

        li {
            color: white;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <!-- 0. 소개 -->
        <h1>호텔 체크인 관리</h1>
        <p>호텔의 체크인/체크아웃을 관리하는 웹 페이지입니다.</p>
        <img src="./hotel.jpg" alt="호텔 이미지입니다." />
        <!-- 1. 이미 체크인된 사람 명단 -->
        <div class="checkin_wrap">
            <h2>체크인 목록</h2>
            <ul id="checkin_list">
                <li>득범</li>
                <li>은혁</li>
                <li>동우</li>
            </ul>
        </div>
        <!-- 2. 체크인/체크아웃 -->
        <div class="checkin_wrap">
            <h2>체크인</h2>
            <input id="input_name" type="text" placeholder="손님 이름을 입력하세요." />
            <button id="btn_checkin">체크인</button>
        </div>
        <div class="checkin_wrap">
            <h2>체크아웃</h2>
            <input id="input_num" type="number" placeholder="손님 순번을 입력하세요." />
            <button id="btn_checkout">체크아웃</button>
        </div>
    </div>
</body>
<script>
    const checkinList = document.getElementById("checkin_list")
    let customerCount = checkinList.children.length

    function checkin(name) {
        if (name.trim().length == 0) {  
            alert("이름을 입력하세요.")
            return false;
        }
        customerCount++;
        return true;
    };

    document.getElementById("btn_checkin").onclick = function () {
        const name = document.getElementById("input_name").value;
        if (checkin(name)) {
            const li = document.createElement("li");
            li.textContent = name;
            checkinList.appendChild(li);
        }
    };

    document.getElementById("btn_checkout").onclick = function () {
        const num = document.getElementById("input_num").value;
        if (num <= customerCount && num >= 1) {
            customerCount--;
            checkinList.children[num -1].remove();
        } else {
            alert(`1부터 ${customerCount} 사이의 값을 입력해주세요.`)
        }
    };
</script>

</html>
